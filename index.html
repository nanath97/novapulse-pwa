<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon navigateur -->
    <link rel="icon" type="image/png" href="/icon-192.png" />

    <!-- Préload fond -->
    <link rel="preload" href="/business-chat-bg.png" as="image">

    <!-- Manifest PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS support -->
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1220" />

    <title>NovaPulse</title>

    <!-- 💥 SPLASH SCREEN STYLE -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 50% 38%, rgba(37, 99, 235, 0.22), transparent 34%),
          radial-gradient(circle at center, #0B1220, #020617);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        overflow: hidden;
      }

      .splash-content {
        text-align: center;
        animation: splashEnter 0.6s ease;
      }

      .splash-loader {
        width: 116px;
        height: 116px;
        border-radius: 50%;
        padding: 4px;
        background: conic-gradient(
          #3b82f6 0deg 270deg,
          rgba(255,255,255,0.08) 270deg 360deg
        );
        animation: rotateLoader 1.2s linear infinite;
        margin: 0 auto 18px;
        box-shadow: 0 0 45px rgba(37, 99, 235, 0.38);
      }

      .splash-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: #07111f;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        box-shadow: 0 0 30px rgba(37, 99, 235, 0.35);
        animation: logoPulse 1.6s ease-in-out infinite;
      }

      .splash-brand {
        color: white;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.04em;
        margin-bottom: 8px;
      }

      .splash-brand span {
        color: #60a5fa;
      }

      .splash-text {
        color: rgba(255,255,255,0.72);
        font-size: 14px;
        font-weight: 500;
      }

      @keyframes rotateLoader {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes splashEnter {
        from {
          opacity: 0;
          transform: scale(0.96);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes logoPulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.045); }
        100% { transform: scale(1); }
      }
    </style>

    <!-- MICROSOFT CLARITY -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "vven9dsj43");
    </script>

  </head>

  <body>

    <!-- 💥 SPLASH SCREEN -->
    <div id="splash">
    <div class="splash-content">
      <div class="splash-loader">
        <div class="splash-inner">
          <img src="/icon-192.png" alt="NovaPulse" class="logo" />
        </div>
      </div>

      <div class="splash-brand">Nova<span>Pulse</span></div>
      <div class="splash-text">Chargement de votre accès privé...</div>
    </div>
  </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
