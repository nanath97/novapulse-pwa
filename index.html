<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon navigateur -->
    <link rel="icon" type="image/png" href="/icon-192.png" />

    <!-- Préload fond -->
    <link rel="preload" href="/business-chat-bg.png" as="image">

    <!-- Manifest PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS support -->
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1220" />

    <title>NovaPulse</title>

    <!-- 💥 SPLASH SCREEN STYLE -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, #0B1220, #020617);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        overflow: hidden;
      }

      .splash-content {
        text-align: center;
        animation: splashEnter 0.8s ease;
      }

      .logo {
        width: 90px;
        height: 90px;
        border-radius: 22px;
        box-shadow: 0 0 40px rgba(37, 99, 235, 0.4);
        animation: logoPulse 1.6s ease-in-out infinite;
      }


      @keyframes splashEnter {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes logoPulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
    </style>

    <!-- MICROSOFT CLARITY -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "vven9dsj43");
    </script>

  </head>

  <body>

    <!-- 💥 SPLASH SCREEN -->
    <div id="splash">
      <div class="splash-content">
        <img src="/icon-192.png" alt="NovaPulse" class="logo" />
        <div class="brand">NovaPulse</div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
